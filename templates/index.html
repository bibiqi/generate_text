<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title> Text Generator </title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon1.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .cute-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            border: 3px dashed #ffb6c1;
            box-shadow: 0 15px 35px rgba(238, 156, 167, 0.3);
        }
        
        /* Đã gộp thêm form-select để Dropdown cũng có viền hồng */
        .form-control, .form-select {
            border-radius: 18px;
            border: 2px solid #ffe4e1;
            background-color: #fffafb;
            padding: 12px 15px;
            color: #555;
            font-weight: 600;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #ffb6c1;
            box-shadow: 0 0 0 0.25rem rgba(255, 182, 193, 0.3);
            outline: none;
        }
        
        .btn-cute {
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border: none;
            border-radius: 50px;
            color: #d84b7a;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(255, 154, 158, 0.4);
            letter-spacing: 1px;
        }
        
        .btn-cute:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.6);
            color: #d84b7a;
        }
        
        h3 {
            color: #d87093;
            font-weight: 700;
        }
        
        label {
            color: #db7093;
            font-weight: 600;
        }
        
        #result {
            background-color: #fff0f5 !important;
            border: 2px solid #ffe4e1 !important;
            border-radius: 20px !important;
            color: #555;
            font-size: 1.05rem;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card cute-card p-4">
                <div class="card-body">
                    
                    <div class="text-center mb-4">
                        <h3>✿ GPT2 - Text Generator ✿</h3>
                        <p class="text-muted" style="font-size: 0.95rem;"></p>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">⊹ what do u want to write? ⊹</label>
                        <textarea id="prompt" 
                                  class="form-control" 
                                  rows="4" 
                                  placeholder="Typing something..."></textarea>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label class="form-label text-muted" style="font-size: 0.85rem;">Length Tokens</label>
                            <input type="number" id="max_tokens" class="form-control" placeholder="50" value="50">
                        </div>
                        <div class="col-6">
                            <label class="form-label text-muted" style="font-size: 0.85rem;">Style Mode</label>
                            <select id="mode" class="form-select">
                                <option value="serious">serious</option>
                                <option value="balanced" selected>balanced</option>
                                <option value="creative">creative</option>
                            </select>
                        </div>
                    </div>

                    <button class="btn btn-cute w-100 py-3 mt-2" onclick="generateText()">
                        ʚ Generate ɞ
                    </button>

                    <hr class="my-4" style="border-top: 2px dashed #ffb6c1; background: transparent;">

                    <h5 class="mb-3" style="color: #d87093; font-weight: 600;">୨୧ Results:</h5>
                    <div id="result" class="p-4" style="white-space: pre-wrap; min-height: 120px;">
                        (wait to submit...)
                    </div>
                    <div id="time-taken" class="text-muted text-end mt-2" style="font-size: 0.85rem; font-style: italic;"></div>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function generateText() {
    const prompt = document.getElementById("prompt").value;
    const maxTokens = document.getElementById("max_tokens").value;
    const mode = document.getElementById("mode").value; 
    const resultDiv = document.getElementById("result");
    const timeDiv = document.getElementById("time-taken");

    resultDiv.innerHTML = "<em>𓂃 responding 𓂃</em>";
    timeDiv.innerText = "";

    try {
        const response = await fetch("/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prompt: prompt,
                max_new_tokens: parseInt(maxTokens),
                mode: mode // Gửi mode lên server
            })
        });

        const data = await response.json();
        resultDiv.innerText = data.generated_text || "⊘ oops, error ⊘";

        if (data.execution_time) {
            timeDiv.innerText = `⏱ render time: ${data.execution_time}s ⊹`;
        }
    } catch (error) {
        resultDiv.innerText = "◷ waiting for server ◷";
    }
}
</script>

</body>
</html>
